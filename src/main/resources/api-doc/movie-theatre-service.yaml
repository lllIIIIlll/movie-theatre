openapi: 3.0.0
info:
  title: Movie Theatre Service
  version: 1.0.0
  description: |
    This microservice is designed to retrieve movie information from TMDB (The Movie Database) and download related resources from the internet. It provides a comprehensive API for querying, filtering, and managing movie data, supporting efficient content retrieval and resource acquisition.

tags:
  - name: Genres
    description: Operations related to movie and TV show genres
  - name: Movies
    description: Operations related to movie information
  - name: TV Shows
    description: Operations related to TV show information
  - name: Search
    description: Search operations across movies, TV shows, and people

paths:
  /search:
    get:
      tags:
        - Search
      summary: Search for movies, TV shows, and people
      description: |
        Searches for movies, TV shows, and people based on the provided query string.
        Results are paginated and can be filtered by language.
      operationId: search
      parameters:
        - name: query
          in: query
          description: The search query string
          required: true
          schema:
            type: string
        - name: pageNumber
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseSearchResultDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /movies/popular:
    get:
      tags:
        - Movies
      summary: Get popular movies
      description: Retrieves a paginated list of popular movies
      operationId: getPopularMovies
      parameters:
        - name: region
          in: query
          description: Region code for filtering movies (e.g., US, FR)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseBaseMovieDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /movies/now-playing:
      get:
        tags:
          - Movies
        summary: Get now playing movies
        description: Retrieves a paginated list of movies currently playing in theaters
        operationId: getNowPlayingMovies
        parameters:
          - name: region
            in: query
            description: Region code for filtering movies (e.g., US, FR)
            required: false
            schema:
              type: string
          - name: page
            in: query
            description: Page number for paginated results
            required: false
            schema:
              type: integer
              default: 1
              minimum: 1
          - name: Accept-Language
            in: header
            description: Language code for localized results (e.g., en-US, fr-FR)
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Successful operation
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PaginatedResponseBaseMovieDTO'
          '400':
            description: Bad request - Invalid parameters
          '401':
            description: Unauthorized - Authentication is required
          '403':
            description: Forbidden - Insufficient permissions to access this resource
          '500':
            description: Internal server error
            
  /movies/trending/{time_window}:
    get:
      tags:
        - Movies
      summary: Get trending movies
      description: Retrieves a paginated list of trending movies for the specified time window
      operationId: getTrendingMovies
      parameters:
        - name: time_window
          in: path
          description: Time window for trending movies (e.g., day, week)
          required: true
          schema:
            type: string
            enum: [day, week]
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseTrendingMovieDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /genres/movie:
    get:
      tags:
        - Genres
      summary: Get movie genres
      description: Retrieves a list of all available movie genres
      operationId: getMovieGenres
      parameters:
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GenreDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /genres/tv-show:
      get:
        tags:
          - Genres
        summary: Get TV show genres
        description: Retrieves a list of all available TV show genres
        operationId: getTVShowGenres
        parameters:
          - name: Accept-Language
            in: header
            description: Language code for localized results (e.g., en-US, fr-FR)
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Successful operation
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/GenreDTO'
          '400':
            description: Bad request - Invalid parameters
          '401':
            description: Unauthorized - Authentication is required
          '403':
            description: Forbidden - Insufficient permissions to access this resource
          '500':
            description: Internal server error

  /tv-shows/trending/{time_window}:
    get:
      tags:
        - TV Shows
      summary: Get trending TV shows
      description: Retrieves a paginated list of trending TV shows for the specified time window
      operationId: getTrendingTVShows
      parameters:
        - name: time_window
          in: path
          description: Time window for trending TV shows (e.g., day, week)
          required: true
          schema:
            type: string
            enum: [day, week]
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseTrendingTVShowDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

components:
  schemas:
    PaginatedResponseSearchResultDTO:
      type: object
      properties:
        data:
          type: array
          description: List of search results for the current page
          items:
            oneOf:
              - $ref: '#/components/schemas/MovieSearchResultDTO'
              - $ref: '#/components/schemas/TVSearchResultDTO'
              - $ref: '#/components/schemas/PersonSearchResultDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages

    PaginatedResponseBaseMovieDTO:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BaseMovieDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages
          
    PaginatedResponseTrendingMovieDTO:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrendingMovieDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages
    
    TrendingMovieDTO:
      allOf:
        - $ref: '#/components/schemas/BaseMovieDTO'
        - type: object
          properties:
            trendingRank:
              type: integer
              description: Ranking position in the trending list
    
    SearchResultDTO:
      type: object
      description: Base search result DTO

    MovieSearchResultDTO:
      allOf:
        - $ref: '#/components/schemas/SearchResultDTO'
        - type: object
          properties:
            id:
              type: integer
              description: Movie ID
            mediaType:
              type: enum
              enum: [movie]
              description: Type of media (movie)
            name:
              type: string
              description: Movie title
            overview:
              type: string
              description: Movie overview/description
            releaseDate:
              type: string
              format: date-time
              description: Movie release date
            posterPath:
              type: string
              description: Path to movie poster image

    TVSearchResultDTO:
      allOf:
        - $ref: '#/components/schemas/SearchResultDTO'
        - type: object
          properties:
            id:
              type: integer
              description: TV show ID
            mediaType:
              type: enum
              enum: [tv]
              description: Type of media (tv)
            name:
              type: string
              description: TV show title
            overview:
              type: string
              description: TV show overview/description
            releaseDate:
              type: string
              format: date-time
              description: TV show first air date
            posterPath:
              type: string
              description: Path to TV show poster image

    PersonSearchResultDTO:
      allOf:
        - $ref: '#/components/schemas/SearchResultDTO'
        - type: object
          xml:
            name: "PersonSearchResult"
          properties:
            id:
              type: integer
              description: Person ID
            mediaType:
              type: enum
              enum: [person]
              description: Type of media (person)
            name:
              type: string
              description: Person's name
            overview:
              type: string
              description: Person's biography
            posterPath:
              type: string
              description: Path to person's profile image

    BaseMovieDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the movie
        posterPath:
          type: string
          description: Path to the movie's poster image
        name:
          type: string
          description: Name/title of the movie
        genres:
          type: array
          description: List of genres associated with the movie
          items:
            $ref: '#/components/schemas/GenreDTO'
        releaseDate:
          type: string
          format: date-time
          description: Release date of the movie
        overview:
          type: string
          description: Overview or summary of the movie plot

    GenreDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the genre
        name:
          type: string
          description: Name of the genre

    PaginatedResponseTrendingTVShowDTO:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrendingTVShowDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages
    
    TrendingTVShowDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the TV show
        mediaType:
          type: string
          description: Type of media (tv)
        posterPath:
          type: string
          description: Path to the TV show's poster image
        backdropPath:
          type: string
          description: Path to the TV show's backdrop image
        name:
          type: string
          description: Name/title of the TV show
        genres:
          type: array
          description: List of genres associated with the TV show
          items:
            $ref: '#/components/schemas/GenreDTO'
        releaseDate:
          type: string
          format: date-time
          description: Release date of the TV show
        overview:
          type: string
          description: Overview or summary of the TV show plot
        rating:
          type: number
          format: decimal
          description: TV show rating
      
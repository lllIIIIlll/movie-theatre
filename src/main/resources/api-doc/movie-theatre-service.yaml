openapi: 3.0.0
info:
  title: Movie Theatre Service
  version: 1.0.0
  description: |
    This microservice provides comprehensive movie and TV show information from TMDB (The Movie Database).
    It offers efficient content retrieval, search capabilities, and trending content across all media types.
    
    ## Features
    - **Movie Information**: Detailed movie data including cast, crew, and recommendations
    - **TV Show Information**: Complete TV show details with seasons and episodes
    - **Search Functionality**: Multi-search across movies, TV shows, and people
    - **Trending Content**: Discover what's trending in entertainment
    - **Configuration Management**: Access to genres, countries, and system configuration
    - **Multi-language Support**: Localized content based on Accept-Language header
    
    ## Authentication
    Currently, this API does not require authentication for public endpoints.

tags:
  - name: Movies
    description: Operations related to movie information and discovery
  - name: TV Shows
    description: Operations related to TV show information and seasons
  - name: Search
    description: Search operations across movies, TV shows, and people
  - name: Trending
    description: Operations related to trending content across all media types
  - name: Configuration
    description: Operations related to configuration settings, genres, and countries

paths:
  /search:
    get:
      tags:
        - Search
      summary: Search for movies, TV shows, and people
      description: |
        Performs a comprehensive multi-search across movies, TV shows, and people based on the provided query.
        Returns paginated results with mixed content types that can be filtered and sorted.
      operationId: search
      parameters:
        - name: query
          in: query
          description: Search query string (minimum 1 character)
          required: true
          schema:
            type: string
          example: "avengers"
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 500
          example: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (ISO 639-1 format)
          required: true
          schema:
            type: string
            pattern: '^[a-z]{2}(-[A-Z]{2})?$'
          examples:
            english:
              value: "en-US"
              description: "English (United States)"
            french:
              value: "fr-FR"
              description: "French (France)"
            spanish:
              value: "es-ES"
              description: "Spanish (Spain)"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseSearchResultDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /trending:
    get:
      tags:
        - Trending
      summary: Get trending content
      description: |
        Retrieves a paginated list of trending content (movies, TV shows, people) for the specified time window.
        Content is ranked by popularity and engagement metrics from TMDB.
        
        **Time Windows:**
        - `day`: Content trending in the last 24 hours
        - `week`: Content trending in the last 7 days
      operationId: getTrendingContent
      parameters:
        - name: time_window
          in: query
          description: Time window for trending content
          required: true
          schema:
            type: string
            enum: [day, week]
          example: "week"
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 500
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseTrendingDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /movies/trending:
    get:
      tags:
        - Movies
      summary: Get trending movies
      description: Retrieves a paginated list of trending movies for the specified time window
      operationId: getTrendingMovies
      parameters:
        - name: time_window
          in: query
          description: Time window for trending movies (e.g., day, week)
          required: true
          schema:
            type: string
            enum: [day, week]
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 500
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseBaseMovieDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /movies/discover:
    get:
      tags:
        - Movies
      summary: Discover movies
      description: |
        Discover movies based on various filters and criteria. This endpoint allows you to find movies
        by release year, genre, language, region, and other parameters. Results are sorted and paginated.
        
        **Popular Use Cases:**
        - Find movies by genre (action, comedy, drama, etc.)
        - Filter by release year or date range
        - Discover movies by region or original language
        - Sort by popularity, rating, or release date
      operationId: discoverMovies
      parameters:
        - name: primaryReleaseYear
          in: query
          description: Filter movies by their primary release year
          required: false
          schema:
            type: integer
            minimum: 1900
            maximum: 2030
          example: 2023
        - name: withGenres
          in: query
          description: Comma-separated list of genre IDs to include
          required: false
          schema:
            type: string
            pattern: '^[0-9]+(,[0-9]+)*$'
          example: "28,12,16"
        - name: region
          in: query
          description: Filter movies by region code (ISO 3166-1 alpha-2)
          required: false
          schema:
            type: string
            pattern: '^[A-Z]{2}$'
          example: "US"
        - name: withOriginalLanguage
          in: query
          description: Filter movies by their original language (ISO 639-1)
          required: false
          schema:
            type: string
            pattern: '^[a-z]{2}$'
          example: "en"
        - name: sortBy
          in: query
          description: Field to sort the results by
          required: false
          schema:
            type: string
            enum: [popularity.desc, popularity.asc, release_date.desc, release_date.asc, vote_average.desc, vote_average.asc]
            default: popularity.desc
          example: "popularity.desc"
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseBaseMovieDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '501':
          description: Not implemented yet

  /movies/{id}:
    get:
      tags:
        - Movies
      summary: Get movie details by ID
      description: Retrieves detailed information about a specific movie
      operationId: getMovieById
      parameters:
        - name: id
          in: path
          description: Movie ID
          required: true
          schema:
            type: integer
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '404':
          description: Not found - Movie with the specified ID does not exist
        '500':
          description: Internal server error

  /tv-shows/trending:
    get:
      tags:
        - TV Shows
      summary: Get trending TV shows
      description: Retrieves a paginated list of trending TV shows for the specified time window
      operationId: getTrendingTVShows
      parameters:
        - name: time_window
          in: query
          description: Time window for trending TV shows (e.g., day, week)
          required: true
          schema:
            type: string
            enum: [day, week]
        - name: page
          in: query
          description: Page number for paginated results
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 500
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseBaseTVShowDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /tv-shows/{id}:
    get:
      tags:
        - TV Shows
      summary: Get TV show details by ID
      description: Retrieves detailed information about a specific TV show
      operationId: getTVShowById
      parameters:
        - name: id
          in: path
          description: TV show ID
          required: true
          schema:
            type: integer
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVShowDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '404':
          description: Not found - TV show with the specified ID does not exist
        '500':
          description: Internal server error

  /tv-shows/{tv_show_id}/seasons/{season_number}:
      get:
        tags:
          - TV Shows
        summary: Get TV season details
        description: Retrieves detailed information about a specific season of a TV show
        operationId: getTVSeasonByTVShowIdAndSeasonNumber
        parameters:
          - name: tv_show_id
            in: path
            description: TV show ID
            required: true
            schema:
              type: integer
          - name: season_number
            in: path
            description: Season number
            required: true
            schema:
              type: integer
          - name: Accept-Language
            in: header
            description: Language code for localized results (e.g., en-US, fr-FR)
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Successful operation
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TVSeasonDTO'
          '400':
            description: Bad request - Invalid parameters
          '401':
            description: Unauthorized - Authentication is required
          '403':
            description: Forbidden - Insufficient permissions to access this resource
          '404':
            description: Not found - TV show or season does not exist
          '500':
            description: Internal server error

  /configuration/genres/movie:
    get:
      tags:
        - Configuration
      summary: Get movie genres
      description: Retrieves a list of all available movie genres
      operationId: getMovieGenres
      parameters:
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GenreDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error

  /configuration/genres/tv-show:
      get:
        tags:
          - Configuration
        summary: Get TV show genres
        description: Retrieves a list of all available TV show genres
        operationId: getTVShowGenres
        parameters:
          - name: Accept-Language
            in: header
            description: Language code for localized results (e.g., en-US, fr-FR)
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Successful operation
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/GenreDTO'
          '400':
            description: Bad request - Invalid parameters
          '401':
            description: Unauthorized - Authentication is required
          '403':
            description: Forbidden - Insufficient permissions to access this resource
          '500':
            description: Internal server error

  /configuration/countries:
    get:
      tags:
        - Configuration
      summary: Get list of countries
      description: Retrieves a list of all available countries with their ISO codes and names
      operationId: getCountries
      parameters:
        - name: Accept-Language
          in: header
          description: Language code for localized results (e.g., en-US, fr-FR)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountryDTO'
        '400':
          description: Bad request - Invalid parameters
        '401':
          description: Unauthorized - Authentication is required
        '403':
          description: Forbidden - Insufficient permissions to access this resource
        '500':
          description: Internal server error
        '501':
          description: Not implemented yet

components:
  schemas:
    PaginatedResponseSearchResultDTO:
      type: object
      properties:
        data:
          type: array
          description: List of search results for the current page
          items:
            $ref: '#/components/schemas/SearchResultDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages

    PaginatedResponseBaseMovieDTO:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BaseMovieDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages

    PaginatedResponseBaseTVShowDTO:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BaseTVShowDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages
  
    PaginatedResponseTrendingDTO:
      type: object
      properties:
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/TrendingMovieDTO'
              - $ref: '#/components/schemas/TrendingTVShowDTO'
              - $ref: '#/components/schemas/TrendingPersonDTO'
        page:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages available
        total:
          type: integer
          description: Total number of results across all pages

    SearchResultDTO:
      type: object
      description: Base search result DTO
      properties:
        id:
          type: integer
          description: Unique identifier of the search result
        mediaType:
          type: string
          description: Type of media (movie, tv, person)
        name:
          type: string
          description: Name/title of the search result
        overview:
          type: string
          description: Overview or summary of the search result
        releaseDate:
          type: string
          format: date-time
          description: Release date (for movies and TV shows)
        posterPath:
          type: string
          description: Path to the poster image
        genres:
          type: array
          description: List of genres associated with the movie
          items:
            $ref: '#/components/schemas/GenreDTO'

    BaseMovieDTO:
      type: object
      description: Basic movie information DTO
      properties:
        id:
          type: integer
          description: Unique identifier of the movie
          example: 24428
        posterPath:
          type: string
          description: Path to the movie's poster image (relative to TMDB image base URL)
          nullable: true
        name:
          type: string
          description: Name/title of the movie
          example: "The Avengers"
        genres:
          type: array
          description: List of genres associated with the movie
          items:
            $ref: '#/components/schemas/GenreDTO'
          example:
            - id: 28
              name: "Action"
            - id: 12
              name: "Adventure"
        releaseDate:
          type: string
          format: date-time
          description: Release date of the movie
          nullable: true
          example: "2012-04-25T00:00:00Z"
        overview:
          type: string
          description: Overview or summary of the movie plot
          nullable: true
          example: "When an unexpected enemy emerges and threatens global safety and security, Nick Fury, director of the international peacekeeping agency known as S.H.I.E.L.D., finds himself in need of a team to pull the world back from the brink of disaster."
          
    MovieDTO:
      allOf:
        - $ref: '#/components/schemas/BaseMovieDTO'
        - type: object
          properties:
            cast:
              type: array
              description: List of cast members in the movie
              items:
                $ref: '#/components/schemas/CastDTO'
            director:
              $ref: '#/components/schemas/CrewDTO'
              description: Director of the movie
            editor:
              $ref: '#/components/schemas/CrewDTO'
              description: Editor of the movie
            recommendations:
              type: array
              description: List of recommended movies
              items:
                $ref: '#/components/schemas/BaseMovieDTO'
                
    CastDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the cast member
        name:
          type: string
          description: Name of the cast member
        character:
          type: string
          description: Character played by the cast member
        profilePath:
          type: string
          description: Path to the cast member's profile image
    
    CrewDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the crew member
        name:
          type: string
          description: Name of the crew member
        profilePath:
          type: string
          description: Path to the crew member's profile image
        department:
          type: string
          description: Department the crew member belongs to
        job:
          type: string
          description: Job title of the crew member

    CreatorDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the crew member
        name:
          type: string
          description: Name of the crew member
        profilePath:
          type: string
          description: Path to the crew member's profile image
        department:
          type: string
          description: Department the crew member belongs to

    GenreDTO:
      type: object
      description: Genre information DTO
      properties:
        id:
          type: integer
          description: Unique identifier of the genre
          example: 28
        name:
          type: string
          description: Name of the genre
          example: "Action"
    
    TrendingDTO:
      type: object
      description: Trending DTO

    TrendingMovieDTO:
      allOf:
        - $ref: '#/components/schemas/TrendingDTO'
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier of the movie
            posterPath:
              type: string
              description: Path to the movie's poster image
            name:
              type: string
              description: Name/title of the movie
            genres:
              type: array
              description: List of genres associated with the movie
              items:
                $ref: '#/components/schemas/GenreDTO'
            releaseDate:
              type: string
              format: date-time
              description: Release date of the movie
            overview:
              type: string
              description: Overview or summary of the movie plot
            rating:
              type: number
              format: decimal
              description: Movie rating

    TrendingTVShowDTO:
      allOf:
        - $ref: '#/components/schemas/TrendingDTO'
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier of the TV show
            mediaType:
              type: string
              description: Type of media (tv)
            posterPath:
              type: string
              description: Path to the TV show's poster image
            backdropPath:
              type: string
              description: Path to the TV show's backdrop image
            name:
              type: string
              description: Name/title of the TV show
            genres:
              type: array
              description: List of genres associated with the TV show
              items:
                $ref: '#/components/schemas/GenreDTO'
            releaseDate:
              type: string
              format: date-time
              description: First air date of the TV show
            overview:
              type: string
              description: Overview or summary of the TV show plot
            rating:
              type: number
              format: decimal
              description: TV show rating

    TrendingPersonDTO:
      allOf:
        - $ref: '#/components/schemas/TrendingDTO'
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier of the person
            mediaType:
              type: string
              enum: [person]
              description: Type of media (person)
            name:
              type: string
              description: Person's name
            profilePath:
              type: string
              description: Path to the person's profile image
            popularity:
              type: number
              format: float
              description: Person's popularity score
            knownFor:
              type: array
              description: List of media the person is known for
              items:
                oneOf:
                  - $ref: '#/components/schemas/BaseMovieDTO'
                  - $ref: '#/components/schemas/BaseTVShowDTO'
              
    BaseTVShowDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the TV show
        mediaType:
          type: string
          description: Type of media (tv)
        posterPath:
          type: string
          description: Path to the TV show's poster image
        backdropPath:
          type: string
          description: Path to the TV show's backdrop image
        name:
          type: string
          description: Name/title of the TV show
        genres:
          type: array
          description: List of genres associated with the TV show
          items:
            $ref: '#/components/schemas/GenreDTO'
        releaseDate:
          type: string
          format: date-time
          description: First air date of the TV show
        overview:
          type: string
          description: Overview or summary of the TV show plot
        rating:
          type: number
          format: decimal
          description: TV show rating
              
    TVShowDTO:
      allOf:
        - $ref: '#/components/schemas/BaseTVShowDTO'
        - type: object
          properties:
            seasons:
              type: array
              description: List of seasons in the TV show
              items:
                $ref: '#/components/schemas/BaseTVSeasonDTO'
            cast:
              type: array
              description: List of cast members in the TV show
              items:
                $ref: '#/components/schemas/CastDTO'
            createdBy:
              type: array
              description: List of creators of the TV show
              items:
                $ref: '#/components/schemas/CreatorDTO'
            recommendations:
              type: array
              description: List of recommended TV shows
              items:
                $ref: '#/components/schemas/BaseTVShowDTO'
                        
    BaseTVSeasonDTO:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the season
        name:
          type: string
          description: Name/title of the season
        overview:
          type: string
          description: Overview or summary of the season
        posterPath:
          type: string
          description: Path to the season's poster image
        seasonNumber:
          type: integer
          description: Season number
        episodeCount:
          type: integer
          description: Number of episodes in the season
        releaseDate:
          type: string
          format: date-time
          description: Release date of the season
        rating:
          type: integer
          description: Season rating

    TVSeasonDTO:
      allOf:
        - $ref: '#/components/schemas/BaseTVSeasonDTO'
        - type: object
          properties:
            episodes:
              type: array
              description: List of episodes in the season
              items:
                $ref: '#/components/schemas/TVBaseEpisode'
            cast:
              type: array
              description: List of cast members in the season
              items:
                $ref: '#/components/schemas/CastDTO'
                
    TVBaseEpisode:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the episode
        name:
          type: string
          description: Name/title of the episode
        overview:
          type: string
          description: Overview or summary of the episode
        airDate:
          type: string
          format: date-time
          description: Air date of the episode
        episodeNumber:
          type: integer
          description: Episode number within the season
        seasonNumber:
          type: integer
          description: Season number the episode belongs to
        posterPath:
          type: string
